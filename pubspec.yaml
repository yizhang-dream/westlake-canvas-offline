name: canvas_offline
description: Canvas Offline - 本地离线 Canvas 客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP 请求
  dio: ^5.3.0
  
  # 本地存储
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  
  # JSON 解析
  json_annotation: ^4.8.0
  
  # UI 组件
  cupertino_icons: ^1.0.6
  
  # 工具
  intl: ^0.18.0
  provider: ^6.0.0
  flutter_html: ^3.0.0
  open_filex: ^4.7.0
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
